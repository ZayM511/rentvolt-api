<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Checkout cancelled — RentVolt</title>
<meta name="robots" content="noindex">
<style>
  :root { --bg:#0a0a1a; --fg:#fff; --muted:rgba(255,255,255,0.72); --accent:#00d4ff; --card:rgba(255,255,255,0.04); --border:rgba(255,255,255,0.12); }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{max-width:560px;width:100%;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px}
  h1{margin:0 0 8px;font-size:26px}
  .muted{color:var(--muted)}
  .btn{display:inline-block;background:var(--accent);color:#000;padding:12px 20px;border-radius:8px;text-decoration:none;font-weight:600;margin:6px 6px 0 0}
  .btn-outline{background:transparent;color:var(--fg);border:1px solid var(--border)}
  label{display:block;margin:16px 0 6px;color:var(--muted);font-size:14px}
  select,textarea,input{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--fg);padding:10px 12px;border-radius:8px;font-family:inherit;font-size:14px}
  textarea{min-height:80px;resize:vertical}
  hr{border:none;border-top:1px solid var(--border);margin:28px 0}
  #ok{color:#3fe083;margin-top:12px;display:none}
</style>
</head>
<body>
  <div class="card">
    <h1>Checkout cancelled</h1>
    <p class="muted">No worries — no payment was taken. You can still try RentVolt for free (100 requests/month, no card required).</p>

    <div style="margin-top:20px">
      <a href="/pricing" class="btn">See plans again</a>
      <a href="/#tryit" class="btn btn-outline">Try the demo</a>
      <a href="/" class="btn btn-outline">Back to home</a>
    </div>

    <hr>

    <h3 style="margin-bottom:8px">Mind sharing why you didn't continue?</h3>
    <p class="muted" style="font-size:13px;margin-top:0">Totally optional. Helps us make it better.</p>
    <form id="fb">
      <label>Reason</label>
      <select name="reason">
        <option value="">— choose one —</option>
        <option>Price too high</option>
        <option>Missing a feature I need</option>
        <option>Just exploring / not ready to buy</option>
        <option>Found a different tool</option>
        <option>Technical issue with checkout</option>
        <option>Other</option>
      </select>
      <label>Anything to add?</label>
      <textarea name="message" placeholder="Optional"></textarea>
      <label>Email (optional, only if you want a reply)</label>
      <input name="email" type="email" placeholder="you@example.com">
      <button type="submit" class="btn" style="margin-top:16px">Send feedback</button>
      <div id="ok">Thanks — noted.</div>
    </form>
  </div>

<script src="/cancel.js" defer></script>
</body>
</html>
