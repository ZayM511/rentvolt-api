services:
  - type: web
    name: rentvolt-api
    env: node
    region: oregon
    plan: starter
    # Build runs without DATABASE_URL, so migrations cannot run here.
    # They run at app start via src/index.js, which has access to runtime env vars.
    buildCommand: npm install
    startCommand: npm run migrate && npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: BASE_URL
        value: https://rentvolt-api.onrender.com
      - key: CORS_ORIGIN
        value: https://rentvolt-api.onrender.com
      - key: RATE_LIMIT_MAX
        value: "200"
      # Set via Render dashboard (secret):
      # - DATABASE_URL           → attach Postgres "rentvolt-db" (Internal URL)
      # - STRIPE_SECRET_KEY
      # - STRIPE_WEBHOOK_SECRET
      # - STRIPE_PRICE_GROWTH
      # - STRIPE_PRICE_SCALE
      # - STRIPE_PRICE_ENTERPRISE
      # - RENTCAST_API_KEY
      # - RESEND_API_KEY
      # - EMAIL_FROM            (e.g. "RentVolt <noreply@groundworklabs.io>")
      # - EMAIL_REPLY_TO        (e.g. "support@groundworklabs.io")
      # - HUD_API_TOKEN         (optional — https://www.huduser.gov/portal/dataset/fmr-api.html)
      # - CENSUS_API_KEY        (optional — https://api.census.gov/data/key_signup.html)
      # - SESSION_SECRET        (required — generate with `node -e "console.log(require('crypto').randomBytes(48).toString('hex'))"`)
      # - GEMINI_API_KEY        (optional — used only by scripts/generate-og.js, not at runtime)
      # - SENTRY_DSN            (optional)
